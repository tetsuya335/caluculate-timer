<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルラップ・リンカー</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans text-gray-800">

  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 space-y-6">
    <h1 class="text-xl font-bold text-center border-b pb-3 text-indigo-600">🕒 ルラップ・リンカー</h1>

    <!-- GAS URL 設定欄（最初だけ入力すればOK） -->
    <div class="space-y-1">
      <label class="text-xs font-semibold text-gray-500">GAS WebアプリURL</label>
      <input type="text" id="gasUrl" class="w-full p-2 border rounded-lg text-xs" placeholder="https://script.google.com/macros/s/.../exec" onchange="saveUrl()">
    </div>

    <!-- タイマー操作（スマホ代替用） -->
    <div class="grid grid-cols-2 gap-4">
      <button onclick="sendAction('START')" class="bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold py-4 rounded-xl shadow-md transition text-lg">
        ▶ START
      </button>
      <button onclick="sendAction('STOP')" class="bg-rose-500 hover:bg-rose-600 active:scale-95 text-white font-bold py-4 rounded-xl shadow-md transition text-lg">
        ■ STOP
      </button>
    </div>

    <!-- 更新・読み込みボタン -->
    <button onclick="loadLatest()" class="w-full bg-gray-200 hover:bg-gray-300 py-2 rounded-lg text-sm font-medium transition">
      🔄 履歴を更新する
    </button>

    <!-- 履歴・仕分けエリア -->
    <div class="space-y-3">
      <h2 class="font-bold text-sm text-gray-600">📌 最近の作業ログ（最新5件）</h2>
      <div id="logList" class="space-y-3 text-sm">
        <p class="text-gray-400 text-center py-4">URLを入力して更新してください</p>
      </div>
    </div>
  </div>

  <!-- 仕分け用ポップアップ（モーダル） -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
      <h3 class="font-bold text-lg text-indigo-600">📝 作業内容の仕分け</h3>
      <input type="hidden" id="targetId">
      
      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">作業内容</label>
        <input type="text" id="taskName" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="例: 案件Aのプログラミング">
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">見込み時間</label>
        <div class="grid grid-cols-4 gap-2 text-xs">
          <button type="button" onclick="setEstimate('15分')" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">15分</button>
          <button type="button" onclick="setEstimate('30分')" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">30分</button>
          <button type="button" onclick="setEstimate('45分')" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">45分</button>
          <button type="button" onclick="setEstimate('60分')" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">60分</button>
        </div>
        <input type="hidden" id="estimateTime">
      </div>

      <div class="flex space-x-3 pt-2">
        <button onclick="closeModal()" class="w-1/2 bg-gray-100 hover:bg-gray-200 py-2 rounded-xl font-medium">キャンセル</button>
        <button onclick="submitUpdate()" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl font-bold">確定する</button>
      </div>
    </div>
  </div>

  <script>
    // ページ読み込み時に保存されたURLを復元
   
    const MY_GAS_URL = 'https://script.google.com/macros/s/AKfycbxt015sK_zqRzMHT5qbBi3gG6rQmVG5GeodLAUIIZkwMjeogy22MX9JlIFguUzTs3Ix_w/exec'
// ページ読み込み時に自動でデータを読み込む
    window.onload = () => {
      document.getElementById('gasUrl').value = MY_GAS_URL;
      loadLatest();
    };

    function saveUrl() {
      // ハードコードするため、この関数は空っぽでOKになります
    }

    function getUrl() {
      return MY_GAS_URL;
    }
//    window.onload = () => {
//  
//    const savedUrl = localStorage.getItem('gas_url');
//      if (savedUrl) {
//        document.getElementById('gasUrl').value = savedUrl;
//        loadLatest();
//      }
//    };

//    function saveUrl() {
//      localStorage.setItem('gas_url', document.getElementById('gasUrl').value);
//    }

//    function getUrl() {
//      return document.getElementById('gasUrl').value;
//    }

    // START / STOP 送信
    async function sendAction(event) {
      const url = getUrl();
      if (!url) return alert('GASのURLを入力してください');
      try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'append', event: event }) });
        const data = await res.json();
        loadLatest(); // 反映後のデータを再読み込み
      } catch (e) { alert('通信エラーが発生しました'); }
    }

    // 最新5件の読み込み
    async function loadLatest() {
      const url = getUrl();
      if (!url) return;
      const container = document.getElementById('logList');
      container.innerHTML = '<p class="text-gray-400 text-center py-4">読み込み中...</p>';
      
      try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'get_latest' }) });
        const result = await res.json();
        
        if (result.status === 'success') {
          container.innerHTML = '';
          result.data.forEach(row => {
            const isUnclassified = !row.task;
            const card = document.createElement('div');
            // 未分類のものはオレンジの枠線で目立たせる
            card.className = `p-3 rounded-xl border transition ${isUnclassified ? 'border-amber-400 bg-amber-50/50 cursor-pointer hover:bg-amber-100/50' : 'border-gray-200 bg-gray-50'}`;
            if (isUnclassified) {
              card.onclick = () => openModal(row.id);
            }
            
            card.innerHTML = `
              <div class="flex justify-between font-bold text-xs text-gray-400 mb-1">
                <span>⏱ ${row.start.split(' ')[1] || row.start} 〜 ${row.end ? row.end.split(' ')[1] : '計測中...'}</span>
                <span class="${isUnclassified ? 'text-amber-600' : 'text-gray-500'}">${row.actual || '-分'}</span>
              </div>
              <div class="text-sm font-semibold">${row.task || '⚠️ 未分類（タップして仕分け）'}</div>
              ${row.estimate ? `<div class="text-xs text-gray-500 mt-1">🎯 見込み: ${row.estimate}</div>` : ''}
            `;
            container.appendChild(card);
          });
        }
      } catch (e) { container.innerHTML = '<p class="text-red-500 text-center py-4">データの取得に失敗しました</p>'; }
    }

    // モーダル操作
    function openModal(id) {
      document.getElementById('targetId').value = id;
      document.getElementById('taskName').value = '';
      document.getElementById('estimateTime').value = '';
      document.querySelectorAll('.est-btn').forEach(b => b.className = 'est-btn bg-gray-100 p-2 rounded-lg font-medium');
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function setEstimate(val) {
      document.getElementById('estimateTime').value = val;
      document.querySelectorAll('.est-btn').forEach(b => {
        if (b.innerText === val) {
          b.className = 'est-btn bg-indigo-600 text-white p-2 rounded-lg font-bold';
        } else {
          b.className = 'est-btn bg-gray-100 p-2 rounded-lg font-medium';
        }
      });
    }

    // 仕分け確定送信
    async function submitUpdate() {
      const url = getUrl();
      const id = document.getElementById('targetId').value;
      const task = document.getElementById('taskName').value;
      const estimate = document.getElementById('estimateTime').value;
      
      if (!task) return alert('作業内容を入力してください');
      
      try {
        const res = await fetch(url, {
          method: 'POST',
          body: JSON.stringify({ action: 'update', id: id, task: task, estimate: estimate })
        });
        const data = await res.json();
        if (data.status === 'updated') {
          closeModal();
          loadLatest();
        }
      } catch (e) { alert('更新に失敗しました'); }
    }
  </script>
</body>
</html>
