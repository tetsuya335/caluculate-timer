<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルラップ・リンカー</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans text-gray-800">

  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 space-y-6">
    <h1 class="text-xl font-bold text-center border-b pb-3 text-indigo-600">🕒 ルラップ・リンカー</h1>

    <div class="space-y-1">
      <label class="text-xs font-semibold text-gray-500">GAS WebアプリURL</label>
      <input type="text" id="gasUrl" class="w-full p-2 border rounded-lg text-xs" placeholder="https://script.google.com/macros/s/.../exec" onchange="saveUrl()">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <button onclick="sendAction('START')" class="bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold py-4 rounded-xl shadow-md transition text-lg">
        ▶ START
      </button>
      <button onclick="sendAction('STOP')" class="bg-rose-500 hover:bg-rose-600 active:scale-95 text-white font-bold py-4 rounded-xl shadow-md transition text-lg">
        ■ STOP
      </button>
    </div>

    <button onclick="loadLatest()" class="w-full bg-gray-200 hover:bg-gray-300 py-2 rounded-lg text-sm font-medium transition">
      🔄 履歴を更新する
    </button>
    
    <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 text-center shadow-sm">
      <p class="text-xs font-bold text-indigo-400">本日の実作業時間</p>
      <p id="todayTotalTime" class="text-2xl font-black text-indigo-600 tracking-wider">-- 時間</p>
    </div>
    
    <div class="space-y-3">
      <div class="flex justify-between items-center">
        <h2 class="font-bold text-sm text-gray-600">📌 最近の作業ログ（最新5件）</h2>
        <div class="flex items-center bg-gray-200 p-0.5 rounded-lg text-xs font-bold">
          <button onclick="setDisplayMode('actual')" id="btnActual" class="px-2 py-1 rounded-md bg-white shadow-sm text-gray-800 transition">実績</button>
          <button onclick="setDisplayMode('remaining')" id="btnRemaining" class="px-2 py-1 rounded-md text-gray-500 hover:text-gray-800 transition">残り</button>
        </div>
      </div>
      <div id="logList" class="space-y-3 text-sm">
        <p class="text-gray-400 text-center py-4">読み込み中...</p>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
      <h3 class="font-bold text-lg text-indigo-600">📝 作業内容の仕分け</h3>
      <input type="hidden" id="targetId">
      
      <div id="historyArea" class="hidden space-y-1">
        <label class="text-xs font-bold text-gray-400">履歴からワンタップ入力</label>
        <div id="historyChips" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto p-1 bg-gray-50 rounded-lg border border-dashed border-gray-200"></div>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">作業内容</label>
        <input type="text" id="taskName" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="例: 案件Aのプログラミング">
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">詳細</label>
        <input type="text" id="taskDetail" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="例: 不具合のデバッグ確認、5S環境整備など">
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">見込み時間（分）</label>
        
        <div class="flex items-center space-x-2">
          <input type="number" id="estimateTime" step="0.1" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none text-right" placeholder="例: 15">
          <span class="text-sm font-bold text-gray-600">分</span>
        </div>

        <div class="grid grid-cols-4 gap-2 text-xs mt-2">
          <button type="button" onclick="setEstimate(15)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">15</button>
          <button type="button" onclick="setEstimate(30)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">30</button>
          <button type="button" onclick="setEstimate(45)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">45</button>
          <button type="button" onclick="setEstimate(60)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">60</button>
          <button type="button" onclick="setEstimate(75)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">75</button>
          <button type="button" onclick="setEstimate(90)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">90</button>
          <button type="button" onclick="setEstimate(120)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">120</button>
          <button type="button" onclick="setEstimate(180)" class="est-btn bg-gray-100 p-2 rounded-lg font-medium">180</button>
        </div>
      </div>

      <div class="flex space-x-3 pt-2">
        <button onclick="closeModal()" class="w-1/2 bg-gray-100 hover:bg-gray-200 py-2 rounded-xl font-medium">キャンセル</button>
        <button onclick="submitUpdate()" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl font-bold">確定する</button>
      </div>
    </div>
  </div>

  <script>
    // ★変更点①：秘密のURLを削除して空にしました
    const DEFAULT_GAS_URL = '';
    
    let latestLogData = [];  
    let displayMode = 'actual'; 
    let refreshInterval = null; 

    window.onload = () => {
      const savedUrl = localStorage.getItem('saved_gas_url') || DEFAULT_GAS_URL;
      document.getElementById('gasUrl').value = savedUrl;
      
      // ★変更点②：URLがまだ設定されていない場合の親切な画面表示
      if (!savedUrl) {
        document.getElementById('logList').innerHTML = '<p class="text-amber-600 font-medium text-center py-4">⚠️ 上部の入力欄にGASのWebアプリURLを設定してください。</p>';
        return;
      }
      
      loadLatest();
    };

    function saveUrl() {
      const inputUrl = document.getElementById('gasUrl').value.trim();
      if (inputUrl) {
        localStorage.setItem('saved_gas_url', inputUrl);
        loadLatest();
      }
    }

    function getUrl() {
      return document.getElementById('gasUrl').value.trim();
    }

    function setDisplayMode(mode) {
      displayMode = mode;
      const btnActual = document.getElementById('btnActual');
      const btnRemaining = document.getElementById('btnRemaining');
      if (mode === 'actual') {
        btnActual.className = 'px-2 py-1 rounded-md bg-white shadow-sm text-gray-800 transition';
        btnRemaining.className = 'px-2 py-1 rounded-md text-gray-500 hover:text-gray-800 transition';
      } else {
        btnActual.className = 'px-2 py-1 rounded-md text-gray-500 hover:text-gray-800 transition';
        btnRemaining.className = 'px-2 py-1 rounded-md bg-white shadow-sm text-gray-800 transition';
      }
      renderLogList();
    }

    async function sendAction(event) {
      const url = getUrl();
      if (!url) return alert('GASのURLを入力してください');

      // 状態ガード（連打・二度押しインターロック）
      if (latestLogData && latestLogData.length > 0) {
        const isTracking = latestLogData.some(row => !row.end);

        if (event === 'START' && isTracking) {
          console.warn('すでに計測中のため、START送信をブロックしました。');
          return;
        }
        if (event === 'STOP' && !isTracking) {
          console.warn('計測中ではないため、STOP送信をブロックしました。');
          return;
        }
      }

      try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'append', event: event }) });
        await res.json();
        loadLatest(); 
      } catch (e) { alert('通信エラーが発生しました'); }
    }
	
    async function loadTodayTotal() {
      const url = getUrl();
      if (!url) return;
      const displayElement = document.getElementById('todayTotalTime');
      displayElement.innerText = '計算中...';
      try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'get_today_total' }) });
        const result = await res.json();
        if (result.status === 'success') {
          displayElement.innerText = `${result.totalHours} 時間`;
        } else {
          displayElement.innerText = 'エラー';
        }
      } catch (e) { displayElement.innerText = '取得失敗'; }
    }

    async function loadLatest() {
      const url = getUrl();
      if (!url) return;
	  
      loadTodayTotal();
      const container = document.getElementById('logList');
      if (latestLogData.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center py-4">読み込み中...</p>';
      }
      
      try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'get_latest' }) });
        const result = await res.json();
        if (result.status === 'success') {
          latestLogData = result.data;
          renderLogList();
          
          if (!refreshInterval) {
            refreshInterval = setInterval(renderLogList, 1000);
          }
        }
      } catch (e) { container.innerHTML = '<p class="text-red-500 text-center py-4">データの取得に失敗しました。</p>'; }
    }

    function renderLogList() {
      const container = document.getElementById('logList');
      if (!latestLogData || latestLogData.length === 0) return;

      container.innerHTML = '';
      latestLogData.forEach(row => {
        const isUnclassified = !row.task;
        
        const formatTime = (timeStr) => {
          if (!timeStr) return '';
          const d = new Date(timeStr);
          if (isNaN(d.getTime())) return timeStr.split(' ')[1] || timeStr; 
          return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        };

        const startTime = formatTime(row.start);
        const endTime = row.end ? formatTime(row.end) : '計測中...';

        let elapsedMins = 0;
        if (row.end) {
          elapsedMins = parseFloat(row.actual) || 0;
        } else {
          const startMs = new Date(row.start).getTime();
          const nowMs = new Date().getTime();
          elapsedMins = (nowMs - startMs) / (1000 * 60);
        }

        let timeDisplay = '';
        let isOverdue = false;

        if (displayMode === 'actual') {
          if (row.end) {
            timeDisplay = String(row.actual).includes('分') ? row.actual : row.actual + '分';
          } else {
            const totalSec = Math.floor(elapsedMins * 60);
            timeDisplay = `${Math.floor(totalSec / 60)}分${totalSec % 60}秒`;
          }
        } else {
          if (row.estimate) {
            const estMins = parseFloat(row.estimate) || 0;
            const remainingMins = estMins - elapsedMins;

            if (row.end) {
              const diff = Math.round(remainingMins * 10) / 10;
              if (diff >= 0) {
                timeDisplay = `あと ${diff}分`;
              } else {
                timeDisplay = `超過 ${Math.abs(diff)}分`;
                isOverdue = true;
              }
            } else {
              const totalSec = Math.round(remainingMins * 60);
              if (totalSec >= 0) {
                timeDisplay = `あと ${Math.floor(totalSec / 60)}分${totalSec % 60}秒`;
              } else {
                const absSec = Math.abs(totalSec);
                timeDisplay = `超過 ${Math.floor(absSec / 60)}分${absSec % 60}秒`;
                isOverdue = true;
              }
            }
          } else {
            if (row.end) {
              timeDisplay = String(row.actual).includes('分') ? row.actual : row.actual + '分';
            } else {
              const totalSec = Math.floor(elapsedMins * 60);
              timeDisplay = `${Math.floor(totalSec / 60)}分${totalSec % 60}秒`;
            }
          }
        }

        const card = document.createElement('div');
        card.className = `p-3 rounded-xl border transition ${isUnclassified ? 'border-amber-400 bg-amber-50/50 cursor-pointer hover:bg-amber-100/50' : 'border-gray-200 bg-gray-50'}`;
        if (isUnclassified) {
          card.onclick = () => openModal(row.id);
        }
        
        let timeColorClass = '';
        if (isUnclassified) {
          timeColorClass = 'text-amber-600';
        } else if (isOverdue) {
          timeColorClass = 'text-rose-600 font-bold';
        } else if (!row.end) {
          timeColorClass = 'text-blue-600 font-bold';
        } else {
          timeColorClass = 'text-emerald-600 font-bold';
        }

        card.innerHTML = `
          <div class="flex justify-between font-bold text-xs text-gray-400 mb-1">
            <span>⏱ ${startTime} 〜 ${endTime}</span>
            <span class="${timeColorClass}">${timeDisplay}</span>
          </div>
          <div class="text-sm font-semibold">${row.task || '⚠️ 未分類（タップして仕分け）'}</div>
          ${row.detail ? `<div class="text-xs text-gray-500 mt-0.5 bg-gray-200/50 px-1.5 py-0.5 rounded inline-block">📝 ${row.detail}</div>` : ''}
          ${row.estimate ? `<div class="text-xs text-gray-400 mt-1">🎯 見込み: ${row.estimate}分</div>` : ''}
        `;
        container.appendChild(card);
      });
    }

    function openModal(id) {
      document.getElementById('targetId').value = id;
      document.getElementById('taskName').value = '';
      document.getElementById('taskDetail').value = ''; 
      document.getElementById('estimateTime').value = '';
      updateButtons('');
      renderHistoryChips();
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function setEstimate(val) {
      document.getElementById('estimateTime').value = val;
      updateButtons(val);
    }

    document.getElementById('estimateTime').addEventListener('input', function(e) {
      updateButtons(e.target.value);
    });

    function updateButtons(val) {
      document.querySelectorAll('.est-btn').forEach(b => {
        if (b.innerText == val) {
          b.className = 'est-btn bg-indigo-600 text-white p-2 rounded-lg font-bold';
        } else {
          b.className = 'est-btn bg-gray-100 p-2 rounded-lg font-medium';
        }
      });
    }

    function saveToInputHistory(task, detail, estimate) {
      let history = JSON.parse(localStorage.getItem('linker_task_history') || '[]');
      history = history.filter(item => !(item.task === task && item.detail === detail));
      history.unshift({ task, detail, estimate });
      if (history.length > 6) history.pop();
      localStorage.setItem('linker_task_history', JSON.stringify(history));
    }

    function renderHistoryChips() {
      const container = document.getElementById('historyChips');
      const area = document.getElementById('historyArea');
      const history = JSON.parse(localStorage.getItem('linker_task_history') || '[]');
      
      if (history.length === 0) {
        area.classList.add('hidden');
        return;
      }
      
      area.classList.remove('hidden');
      container.innerHTML = '';
      
      history.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'text-[11px] bg-white hover:bg-indigo-50 border border-gray-200 text-gray-700 px-2 py-1 rounded-md transition text-left truncate max-w-full block shadow-sm active:scale-95';
        
        let label = item.task;
        if (item.detail) label += ` (${item.detail})`;
        
        btn.innerText = label;
        btn.onclick = () => {
          document.getElementById('taskName').value = item.task;
          document.getElementById('taskDetail').value = item.detail || '';
          if (item.estimate) {
            document.getElementById('estimateTime').value = item.estimate;
            updateButtons(item.estimate);
          } else {
            document.getElementById('estimateTime').value = '';
            updateButtons('');
          }
        };
        container.appendChild(btn);
      });
    }

    async function submitUpdate() {
      const url = getUrl();
      const id = document.getElementById('targetId').value;
      const task = document.getElementById('taskName').value.trim();
      const detail = document.getElementById('taskDetail').value.trim(); 
      const estimate = document.getElementById('estimateTime').value;
      
      if (!task) return alert('作業内容を入力してください');
      
      try {
        const res = await fetch(url, {
          method: 'POST',
          body: JSON.stringify({ action: 'update', id: id, task: task, detail: detail, estimate: estimate }) 
        });
        const data = await res.json();
        if (data.status === 'updated') {
          saveToInputHistory(task, detail, estimate);
          closeModal();
          loadLatest();
        }
      } catch (e) { alert('更新に失敗しました'); }
    }
  </script>
</body>
</html>
